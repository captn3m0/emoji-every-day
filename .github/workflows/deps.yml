# Note that this is a low security repo
# since the builds only impact the website
# and we do not have any releases
name: Auto Merge Dependency Updates
on: pull_request
permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - uses: actions/checkout@v6
        name: Clone self repository
        with:
          ref: ${{ github.head_ref }}
          submodules: true
      - name: Skip auto-merge if workflow files changed
        id: guard
        run: |
          set -euo pipefail
          files="$(gh pr view "$PR_URL" --json files --jq '.files[].path')"
          if echo "$files" | grep -qE '^\.github/workflows/'; then
            echo "Workflows changed; skipping auto-merge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Enable auto-merge for Dependabot PRs for release data
        if: steps.guard.outputs.skip != 'true'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}